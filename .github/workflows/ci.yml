name: CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build and test

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read OCaml version
        id: ocaml-version
        shell: bash
        run: echo "version=$(make ocaml-version)" >> "$GITHUB_OUTPUT"

      - name: Use OCaml ${{ steps.ocaml-version.outputs.version }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ steps.ocaml-version.outputs.version }}

      - name: Install
        run: make install

      - name: Build
        run: make build

      - name: Check formatting
        run: make format-check

      - name: Run tests
        run: make test
